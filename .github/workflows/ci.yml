name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest        # needed for the iOS test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android/JVM tests
        run: ./gradlew :shared:testAndroidHostTest

      - name: Run iOS tests
        run: ./gradlew :shared:iosSimulatorArm64Test